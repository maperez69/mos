<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOS Dashboard 2025-2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: #f5f5f7; 
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { 
            background: white; 
            padding: 24px; 
            border-radius: 16px; 
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .title { 
            font-size: 28px; 
            font-weight: 800; 
            color: #1d1d1f;
            margin-bottom: 8px;
        }
        .subtitle { 
            color: #86868b; 
            font-size: 14px; 
        }
        .year-section {
            margin-bottom: 12px;
        }
        .year-label {
            font-size: 11px;
            font-weight: 700;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .filters { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 20px;
            overflow-x: auto;
            flex-wrap: wrap;
        }
        .btn { 
            padding: 10px 16px; 
            border-radius: 10px; 
            border: 1px solid #d2d2d7;
            background: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            color: #1d1d1f;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn:hover { background: #f5f5f7; }
        .btn.active { 
            background: #007aff; 
            color: white; 
            border-color: #007aff;
        }
        .kpis { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 16px;
            margin-bottom: 20px;
        }
        .kpi-card { 
            background: white; 
            padding: 24px; 
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .kpi-label { 
            font-size: 12px; 
            color: #86868b; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .kpi-value { 
            font-size: 32px; 
            font-weight: 700; 
            color: #1d1d1f;
        }
        .kpi-growth { 
            font-size: 14px; 
            margin-top: 4px;
            font-weight: 600;
        }
        .kpi-growth.positive { color: #34c759; }
        .kpi-growth.negative { color: #ff3b30; }
        .kpi-comparison {
            font-size: 12px;
            color: #86868b;
            margin-top: 4px;
        }
        .chart-container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        .chart-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1d1d1f;
        }
        .breakdown-item {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .breakdown-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .breakdown-name {
            font-weight: 600;
            font-size: 15px;
            color: #1d1d1f;
        }
        .breakdown-value {
            font-weight: 700;
            font-size: 16px;
            color: #007aff;
        }
        .progress-bar {
            height: 6px;
            background: #f5f5f7;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #007aff, #0051d5);
            transition: width 0.5s ease;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .tab {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            color: #86868b;
        }
        .tab.active {
            background: #007aff;
            color: white;
        }
    </style>
</head>

        function renderKPIs() {
            const current = DATA.resumen[state.sucursal][state.mes] || 0;
            
            const mesActual = MESES_CONFIG.find(m => m.key === state.mes);
            const mesAnterior = mesActual && mesActual.orden > 0 ? MESES_CONFIG[mesActual.orden - 1] : null;
            const prev = mesAnterior ? (DATA.resumen[state.sucursal][mesAnterior.key] || 0) : null;
            const growth = prev ? ((current - prev) / prev * 100) : 0;
            
            const mesBase = state.mes.substring(0, 3);
            const añoActual = state.mes.substring(3);
            const añoAnterior = añoActual === '26' ? '25' : '24';
            const mesAñoAnterior = mesBase + añoAnterior;
            const valorAñoAnterior = DATA.resumen[state.sucursal][mesAñoAnterior] || 0;
            const growthYoY = valorAñoAnterior ? ((current - valorAñoAnterior) / valorAñoAnterior * 100) : 0;
            
            const avgTicket = 5800;
            const transactions = Math.round(current / avgTicket);
            
            const kpis = [
                { 
                    label: 'Facturación', 
                    value: formatCurrency(current),
                    comparison: valorAñoAnterior > 0 ? `vs ${mesBase.toUpperCase()} ${añoAnterior}: ${formatPercent(growthYoY)}` : ''
                },
                { 
                    label: 'Crecimiento MoM', 
                    value: formatPercent(growth), 
                    growth: growth 
                },
                { 
                    label: 'Ticket Medio', 
                    value: formatCurrency(avgTicket) 
                },
                { 
                    label: 'Transacciones', 
                    value: transactions.toString() 
                }
            ];
            
            document.getElementById('kpis').innerHTML = kpis.map(kpi => `
                <div class="kpi-card">
                    <div class="kpi-label">${kpi.label}</div>
                    <div class="kpi-value">${kpi.value}</div>
                    ${kpi.growth !== undefined ? `<div class="kpi-growth ${kpi.growth >= 0 ? 'positive' : 'negative'}">
                        ${kpi.growth >= 0 ? '↑' : '↓'} ${Math.abs(kpi.growth).toFixed(1)}%
                    </div>` : ''}
                    ${kpi.comparison ? `<div class="kpi-comparison">${kpi.comparison}</div>` : ''}
                </div>
            `).join('');
        }

        function renderEvolutionChart() {
            const container = document.getElementById('evolutionChart');
            const data = DATA.resumen[state.sucursal];
            
            const mesActual = MESES_CONFIG.find(m => m.key === state.mes);
            const startIdx = Math.max(0, mesActual.orden - 5);
            const endIdx = mesActual.orden + 1;
            const mesesChart = MESES_CONFIG.slice(startIdx, endIdx);
            
            const labels = mesesChart.map(m => m.label);
            const values = mesesChart.map(m => data[m.key] || 0);
            
            const width = container.offsetWidth;
            const height = 350;
            const padding = { top: 50, right: 30, bottom: 80, left: 80 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;
            
            const maxValue = Math.max(...values);
            const minValue = Math.min(...values) * 0.85;
            const valueRange = maxValue - minValue;
            
            const points = values.map((value, i) => {
                const x = padding.left + (chartWidth / (values.length - 1)) * i;
                const y = padding.top + chartHeight - ((value - minValue) / valueRange) * chartHeight;
                return { x, y, value, mesKey: mesesChart[i].key };
            });
            
            const linePath = points.map((p, i) => 
                `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`
            ).join(' ');
            
            const areaPath = `M ${points[0].x} ${height - padding.bottom} L ${linePath.substring(2)} L ${points[points.length - 1].x} ${height - padding.bottom} Z`;
            
            container.innerHTML = `
                <svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="display: block;">
                    ${[0, 1, 2, 3, 4].map(i => {
                        const y = padding.top + (chartHeight / 4) * i;
                        const value = maxValue - (valueRange / 4) * i;
                        return `
                            <line x1="${padding.left}" y1="${y}" x2="${width - padding.right}" y2="${y}" 
                                  stroke="#f5f5f7" stroke-width="1"/>
                            <text x="${padding.left - 10}" y="${y + 4}" 
                                  text-anchor="end" font-size="13" fill="#86868b" font-family="-apple-system">
                                $${Math.round(value / 1000)}K
                            </text>
                        `;
                    }).join('')}
                    
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#007aff;stop-opacity:0.4" />
                            <stop offset="100%" style="stop-color:#007aff;stop-opacity:0" />
                        </linearGradient>
                    </defs>
                    <path d="${areaPath}" fill="url(#gradient)" opacity="0.3"/>
                    <path d="${linePath}" fill="none" stroke="#007aff" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
                    
                    ${points.map((point, i) => {
                        const isCurrentMonth = point.mesKey === state.mes;
                        return `
                            ${isCurrentMonth ? `
                                <circle cx="${point.x}" cy="${point.y}" r="12" 
                                        fill="none" stroke="#007aff" stroke-width="6" opacity="0.2"/>
                            ` : ''}
                            
                            <circle cx="${point.x}" cy="${point.y}" r="6" fill="white" stroke="#007aff" stroke-width="3"/>
                            <circle cx="${point.x}" cy="${point.y}" r="2.5" fill="#007aff"/>
                            
                            <text x="${point.x}" y="${point.y - 15}" 
                                  text-anchor="middle" font-size="15" font-weight="${isCurrentMonth ? 'bold' : 'normal'}"
                                  fill="${isCurrentMonth ? '#007aff' : '#1d1d1f'}" font-family="-apple-system">
                                $${Math.round(point.value / 1000)}K
                            </text>
                            
                            <text x="${point.x}" y="${height - padding.bottom + 30}" 
                                  text-anchor="middle" font-size="17" font-weight="bold" fill="#1d1d1f" font-family="-apple-system">
                                ${labels[i]}
                            </text>
                        `;
                    }).join('')}
                </svg>
            `;
        }

        function renderTabs() {
            const tabs = [
                { key: 'departamentos', label: 'Departamentos' },
                { key: 'vendedoras', label: 'Vendedoras' },
                { key: 'servicios', label: 'Servicios' },
                { key: 'analisis', label: 'Análisis' }
            ];
            
            document.getElementById('tabs').innerHTML = tabs.map(t => 
                `<div class="tab ${state.tab === t.key ? 'active' : ''}" onclick="changeTab('${t.key}')">${t.label}</div>`
            ).join('');
        }

        function renderBreakdown() {
            let items = DATA[state.tab];
            
            // Filtrar por sucursal
            if (state.sucursal !== 'Todas' && items[0] && items[0].sucursal !== undefined) {
                items = items.filter(item => item.sucursal === state.sucursal);
            }
            
            if (items.length === 0) {
                document.getElementById('breakdown').innerHTML = '<div style="padding: 20px; text-align: center; color: #86868b;">No hay datos para esta selección</div>';
                return;
            }
            
            // Si sucursal es "Todas", agrupar por nombre
            let processedItems = [];
            if (state.sucursal === 'Todas') {
                const grouped = {};
                items.forEach(item => {
                    if (!grouped[item.name]) {
                        grouped[item.name] = 0;
                    }
                    grouped[item.name] += (item[state.mes] || 0);
                });
                processedItems = Object.entries(grouped).map(([name, value]) => ({ name, value }));
            } else {
                processedItems = items.map(item => ({
                    name: item.name,
                    value: item[state.mes] || 0
                }));
            }
            
            // Filtrar items con valor > 0
            processedItems = processedItems.filter(item => item.value > 0);
            
            if (processedItems.length === 0) {
                document.getElementById('breakdown').innerHTML = '<div style="padding: 20px; text-align: center; color: #86868b;">No hay datos para este mes</div>';
                return;
            }
            
            // Ordenar y encontrar máximo
            processedItems.sort((a, b) => b.value - a.value);
            const maxValue = Math.max(...processedItems.map(i => i.value));
            
            document.getElementById('breakdown').innerHTML = processedItems.map(item => {
                const percent = (item.value / maxValue) * 100;
                return `
                    <div class="breakdown-item">
                        <div class="breakdown-header">
                            <div class="breakdown-name">${item.name}</div>
                            <div class="breakdown-value">${formatCurrency(item.value)}</div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderAnalisis() {
            const getOptions = () => {
                let allItems = [];
                if (state.analisisTipo === 'departamento') {
                    allItems = DATA.departamentos;
                } else if (state.analisisTipo === 'vendedora') {
                    allItems = DATA.vendedoras;
                } else {
                    allItems = DATA.servicios;
                }
                
                const uniqueNames = [...new Set(allItems.map(i => i.name))];
                return uniqueNames;
            };
            
            const options = getOptions();
            
            if (!state.analisisItem || !options.includes(state.analisisItem)) {
                state.analisisItem = options[0];
            }
            
            const getItemData = () => {
                let allItems = [];
                if (state.analisisTipo === 'departamento') {
                    allItems = DATA.departamentos.filter(d => d.name === state.analisisItem);
                } else if (state.analisisTipo === 'vendedora') {
                    allItems = DATA.vendedoras.filter(v => v.name === state.analisisItem);
                } else {
                    allItems = DATA.servicios.filter(s => s.name === state.analisisItem);
                }
                
                const itemData = {};
                MESES_CONFIG.forEach(m => {
                    itemData[m.key] = allItems.reduce((sum, item) => sum + (item[m.key] || 0), 0);
                });
                return itemData;
            };
            
            const itemData = getItemData();
            const valores = MESES_CONFIG.map(m => itemData[m.key]);
            const promedio = valores.reduce((a, b) => a + b, 0) / valores.length;
            const maxValor = Math.max(...valores);
            const minValor = Math.min(...valores);
            const maxIdx = valores.indexOf(maxValor);
            const minIdx = valores.indexOf(minValor);
            const maxMes = MESES_CONFIG[maxIdx].label + ' ' + MESES_CONFIG[maxIdx].año;
            const minMes = MESES_CONFIG[minIdx].label + ' ' + MESES_CONFIG[minIdx].año;
            
            document.getElementById('breakdown').innerHTML = `
                <div style="padding: 20px;">
                    <div style="margin-bottom: 20px;">
                        <div style="font-size: 13px; font-weight: 600; color: #86868b; margin-bottom: 8px;">TIPO DE ANÁLISIS</div>
                        <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                                <input type="radio" name="analisisTipo" value="departamento" ${state.analisisTipo === 'departamento' ? 'checked' : ''} 
                                       onchange="state.analisisTipo = 'departamento'; state.analisisItem = null; render();" 
                                       style="width: 18px; height: 18px; accent-color: #007aff;">
                                <span style="font-size: 15px; color: #1d1d1f;">Departamento</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                                <input type="radio" name="analisisTipo" value="vendedora" ${state.analisisTipo === 'vendedora' ? 'checked' : ''} 
                                       onchange="state.analisisTipo = 'vendedora'; state.analisisItem = null; render();" 
                                       style="width: 18px; height: 18px; accent-color: #007aff;">
                                <span style="font-size: 15px; color: #1d1d1f;">Vendedora</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                                <input type="radio" name="analisisTipo" value="servicio" ${state.analisisTipo === 'servicio' ? 'checked' : ''} 
                                       onchange="state.analisisTipo = 'servicio'; state.analisisItem = null; render();" 
                                       style="width: 18px; height: 18px; accent-color: #007aff;">
                                <span style="font-size: 15px; color: #1d1d1f;">Servicio</span>
                            </label>
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 30px;">
                        <div style="font-size: 13px; font-weight: 600; color: #86868b; margin-bottom: 8px;">SELECCIONAR</div>
                        <select onchange="state.analisisItem = this.value; render();" 
                                style="width: 100%; padding: 12px; font-size: 17px; border: 1px solid #d1d1d6; border-radius: 10px; background: white; font-family: -apple-system;">
                            ${options.map(opt => `<option value="${opt}" ${opt === state.analisisItem ? 'selected' : ''}>${opt}</option>`).join('')}
                        </select>
                    </div>
                    
                    <div style="background: #f5f5f7; border-radius: 12px; padding: 20px; margin-bottom: 20px;">
                        <div style="font-size: 15px; font-weight: 600; color: #1d1d1f; margin-bottom: 15px;">Evolución 14 Meses</div>
                        <div id="analisis-chart"></div>
                    </div>
                    
                    <div style="background: #f5f5f7; border-radius: 12px; padding: 20px;">
                        <div style="font-size: 15px; font-weight: 600; color: #1d1d1f; margin-bottom: 15px;">📊 Métricas</div>
                        <div style="display: grid; gap: 12px;">
                            <div style="display: flex; justify-content: space-between;">
                                <span style="color: #86868b;">Promedio mensual:</span>
                                <span style="font-weight: 600; color: #1d1d1f;">${formatCurrency(promedio)}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between;">
                                <span style="color: #86868b;">Mejor mes:</span>
                                <span style="font-weight: 600; color: #34c759;">${maxMes} (${formatCurrency(maxValor)})</span>
                            </div>
                            <div style="display: flex; justify-content: space-between;">
                                <span style="color: #86868b;">Peor mes:</span>
                                <span style="font-weight: 600; color: #ff3b30;">${minMes} (${formatCurrency(minValor)})</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            renderAnalisisChart(itemData);
        }
        
        function renderAnalisisChart(data) {
            const container = document.getElementById('analisis-chart');
            if (!container) return;
            
            const width = container.offsetWidth || 300;
            const height = 300;
            const padding = { top: 40, right: 30, bottom: 60, left: 60 };
            
            const valores = MESES_CONFIG.map(m => data[m.key]);
            const labels = MESES_CONFIG.map(m => m.label);
            
            const maxValue = Math.max(...valores);
            const minValue = Math.min(...valores);
            const range = maxValue - minValue;
            const yMax = maxValue + (range * 0.2);
            const yMin = Math.max(0, minValue - (range * 0.2));
            
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;
            
            const points = valores.map((val, i) => ({
                x: padding.left + (i * chartWidth / (valores.length - 1)),
                y: padding.top + chartHeight - ((val - yMin) / (yMax - yMin)) * chartHeight,
                value: val
            }));
            
            const pathData = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
            const areaPathData = `${pathData} L ${points[points.length - 1].x} ${height - padding.bottom} L ${points[0].x} ${height - padding.bottom} Z`;
            
            container.innerHTML = `
                <svg width="${width}" height="${height}" style="display: block;" viewBox="0 0 ${width} ${height}">
                    <defs>
                        <linearGradient id="analisis-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#007aff;stop-opacity:0.3" />
                            <stop offset="100%" style="stop-color:#007aff;stop-opacity:0.05" />
                        </linearGradient>
                    </defs>
                    
                    ${[0, 0.25, 0.5, 0.75, 1].map(ratio => {
                        const y = padding.top + chartHeight * (1 - ratio);
                        const value = yMin + (yMax - yMin) * ratio;
                        return `
                            <line x1="${padding.left}" y1="${y}" x2="${width - padding.right}" y2="${y}" 
                                  stroke="#e5e5ea" stroke-width="1"/>
                            <text x="${padding.left - 10}" y="${y + 5}" text-anchor="end" 
                                  font-size="12" fill="#86868b" font-family="-apple-system">
                                $${Math.round(value / 1000)}K
                            </text>
                        `;
                    }).join('')}
                    
                    <path d="${areaPathData}" fill="url(#analisis-gradient)"/>
                    <path d="${pathData}" fill="none" stroke="#007aff" stroke-width="3" 
                          stroke-linejoin="round" stroke-linecap="round"/>
                    
                    ${points.map((point, i) => `
                        <circle cx="${point.x}" cy="${point.y}" r="4" fill="white" stroke="#007aff" stroke-width="2"/>
                        ${i % 2 === 0 ? `
                            <text x="${point.x}" y="${height - padding.bottom + 25}" 
                                  text-anchor="middle" font-size="11" font-weight="600" fill="#1d1d1f" font-family="-apple-system">
                                ${labels[i]}
                            </text>
                        ` : ''}
                    `).join('')}
                </svg>
            `;
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN', minimumFractionDigits: 0 }).format(value);
        }

        function formatPercent(value) {
            return (value >= 0 ? '+' : '') + value.toFixed(1) + '%';
        }

        function changeMes(mes) {
            state.mes = mes;
            render();
        }

        function changeSucursal(sucursal) {
            state.sucursal = sucursal;
            render();
        }

        function changeTab(tab) {
            state.tab = tab;
            render();
        }

        // Inicializar
        console.log('Iniciando render...');
        render();
        console.log('Dashboard listo!');
    </script>
</body>
</html>
